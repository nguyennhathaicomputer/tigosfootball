{% extends 'base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/Inventory.css' %}">

<div class="inventory-page">
    <!-- Nút toggle sidebar (chỉ hiện trên mobile hoặc có thể để luôn) -->
    <button class="sidebar-toggle" id="sidebarToggle">
        <i class="fas fa-filter"></i> Tìm kiếm
    </button>

    <div class="inventory-container">
        <!-- Sidebar tìm kiếm -->
        <aside class="inventory-sidebar" id="inventorySidebar">
            <div class="sidebar-header">
                <h3>Bộ lọc tìm kiếm</h3>
            </div>
            <form class="search-form" method="get" action="">
                <div class="form-group">
                    <label for="product-name">Tên sản phẩm</label>
                    <input type="text" id="product-name" name="name" placeholder="Nhập tên sản phẩm">
                </div>
                <div class="form-group">
                    <label for="product-size">Size</label>
                    <input type="text" id="product-size" name="size" placeholder="Nhập size">
                </div>
                <div class="form-group">
                    <label for="product-price">Giá</label>
                    <input type="number" id="product-price" name="price" placeholder="Nhập giá">
                </div>
                <button type="submit" class="btn-search">Tìm kiếm</button>
            </form>
        </aside>

        <!-- Main: danh sách sản phẩm -->
        <main class="inventory-main">
            <div class="product-list">
                {% for product in products %}
                <div class="product-card">
                    <div class="product-image">
                        <img src="{{ product.image_url }}" alt="{{ product.name }}">
                    </div>
                    <div class="product-info">
                        <h4 class="product-name">{{ product.name }}</h4>
                        <div class="product-details">
                            <span class="product-quantity">SL: {{ product.total_quantity }}</span>
                            <span class="product-color">Màu: {{ product.color }}</span>
                            <span class="product-price">Giá: {{ product.price }} đ</span>
                        </div>
                    </div>
                </div>
                {% empty %}
                <p class="no-products">Không có sản phẩm nào.</p>
                {% endfor %}
            </div>
        </main>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const toggleBtn = document.getElementById('sidebarToggle');
        const sidebar = document.getElementById('inventorySidebar');

        toggleBtn.addEventListener('click', function() {
            sidebar.classList.toggle('hidden');
        });
    });
</script>
{% endblock %}
