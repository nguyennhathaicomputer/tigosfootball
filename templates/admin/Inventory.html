{% extends 'base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/Inventory.css' %}">

<div class="inventory-page">
    <button class="sidebar-toggle" id="sidebarToggle">
        <i class="fas fa-filter"></i> Tìm kiếm
    </button>

    <div class="inventory-container">
        <!-- Sidebar tìm kiếm -->
        <aside class="inventory-sidebar" id="inventorySidebar">
            <div class="sidebar-header">
                <h3>Bộ lọc tìm kiếm</h3>
            </div>
            <form class="search-form" id="searchForm" method="get" action="">
                <div class="form-group">
                    <label for="product-name">Tên sản phẩm</label>
                    <input type="text" id="product-name" name="name" placeholder="Nhập tên sản phẩm" value="{{ request.GET.name }}">
                </div>
                <div class="form-group">
                    <label for="product-size">Size</label>
                    <input type="text" id="product-size" name="size" placeholder="Nhập size" value="{{ request.GET.size }}">
                </div>
                <div class="form-group">
                    <label for="product-price">Giá</label>
                    <input type="number" id="product-price" name="price" placeholder="Nhập giá" value="{{ request.GET.price }}">
                </div>
                <button type="submit" class="btn-search">Tìm kiếm</button>
            </form>
        </aside>
 
        <!-- Main: danh sách sản phẩm -->
        <main class="inventory-main">
            <div class="product-list" id="productList">
                {% include 'includes/product_list_admin.html' %}
            </div>
        </main>
    </div>
</div>


<!-- Modal chi tiết sản phẩm -->
<div id="productModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <div class="modal-body">
            <div class="modal-left">
                <img id="modal-image" src="" alt="Product image">
            </div>
            <div class="modal-right">
                <h2 id="modal-name"></h2>
                <div class="modal-field">
                    <label>Giá:</label>
                    <input type="text" id="modal-price" value="">
                </div>
                <div class="modal-sizes" id="modal-sizes">
                    <!-- Các dòng size sẽ được động tạo bằng JS -->
                </div>
                <div class="modal-actions">
                    <button id="modal-update" class="btn-update">Cập nhật</button>
                    <button id="modal-cancel" class="btn-cancel">Hủy</button>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="{% static 'js/inventory_modal.js' %}"></script>
<script src="{% static 'js/inventory_search.js' %}"></script>
{% endblock %}
