{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigosFootball</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/navbar.css' %}">
</head>
<body>
    <nav class="navbar">
        <div class="navbar__container">
            <!-- Nút hamburger cho mobile -->
            <div class="navbar__toggle" id="navbar-toggle">
                <i class="fas fa-bars"></i>
            </div>

            <!-- Menu chính được tạo từ danh sách brand -->
            <ul class="nav-menu" id="nav-menu">
                {% for brand in brands %}
                <li class="nav-item">
                    <a href="#" class="nav-link">{{ brand.name }}</a>
                    <!-- Nếu sau này cần thêm dropdown, có thể mở rộng ở đây -->
                </li>
                {% endfor %}
            </ul>
        </div>
    </nav>

    <!-- JavaScript cho navbar responsive (đã lược bỏ xử lý dropdown cũ) -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const toggle = document.getElementById('navbar-toggle');
            const menu = document.getElementById('nav-menu');
            
            toggle.addEventListener('click', function() {
                menu.classList.toggle('active');
            });

            // Đóng menu khi resize lên desktop
            window.addEventListener('resize', function() {
                if (window.innerWidth > 768) {
                    menu.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
